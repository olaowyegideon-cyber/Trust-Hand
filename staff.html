<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta http-equiv="X-Content-Type-Options" content="nosniff"/>
<meta http-equiv="X-Frame-Options" content="DENY"/>
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin"/>
<meta name="robots" content="noindex,nofollow"/>
<title>Trusted Hands — Staff Console</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--navy:#0f172a;--navy2:#1e293b;--slate3:#64748b;--blue2:#2563eb;--blue3:#eff6ff;--emerald:#059669;--emerald2:#d1fae5;--amber:#d97706;--amber2:#fef3c7;--red:#dc2626;--red2:#fee2e2;--bg:#f8fafc;--white:#fff;--border:#e2e8f0;--border2:#cbd5e1;--shadow:0 1px 3px rgba(0,0,0,.08);--shadow2:0 4px 20px rgba(0,0,0,.10);--r:12px;--r2:16px}
[data-theme="dark"]{--navy:#f1f5f9;--navy2:#1e293b;--slate3:#94a3b8;--blue2:#3b82f6;--blue3:#1e3a5f;--emerald:#10b981;--emerald2:#064e3b;--amber:#f59e0b;--amber2:#451a03;--red:#ef4444;--red2:#450a0a;--bg:#0a0e14;--white:#151b26;--border:#2a3441;--border2:#3a4654;--shadow:0 1px 3px rgba(0,0,0,.4);--shadow2:0 4px 20px rgba(0,0,0,.5)}
[data-theme="dark"] body{background:var(--bg);color:var(--navy)}
[data-theme="dark"] .inp{background:var(--white);color:var(--navy);border-color:var(--border)}
[data-theme="dark"] .ic,[data-theme="dark"] .pi,[data-theme="dark"] .stat-card{background:var(--white);border-color:var(--border)}
[data-theme="dark"] .atb{background:#0a0e14}
[data-theme="dark"] .at.active{background:var(--white)}
body{transition:background .3s ease,color .3s ease}
.theme-toggle{position:fixed;bottom:20px;right:16px;width:44px;height:44px;border-radius:50%;background:var(--navy2);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:var(--shadow2);z-index:150}
html,body{height:100%;overflow:hidden}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--navy);font-size:15px}
#app{height:100vh;display:flex;flex-direction:column;max-width:520px;margin:0 auto;background:var(--bg)}
.screen{display:none;height:100%;flex-direction:column;overflow:hidden}
.screen.active{display:flex}
.sb{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--blue2);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--navy2);color:#fff;padding:11px 22px;border-radius:24px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.inp{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r);font-size:14px;color:var(--navy);background:var(--white);font-family:inherit;outline:none;transition:.2s}
.inp:focus{border-color:var(--blue2);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.inp::placeholder{color:#94a3b8}
textarea.inp{resize:vertical;min-height:80px}
.btn{width:100%;padding:12px;border-radius:var(--r);font-weight:700;font-size:14px;cursor:pointer;border:none;font-family:inherit;transition:.2s}
.btn:active{transform:scale(.98)}
.bp{background:var(--blue2);color:#fff}
.bo{background:var(--white);color:var(--blue2);border:1.5px solid var(--blue2)}
.bs{background:var(--emerald);color:#fff}
.bd{background:var(--red);color:#fff}
.bsm{padding:7px 14px;font-size:12px;width:auto;border-radius:20px}
.alert{border-radius:var(--r);padding:11px 14px;font-size:13px;margin-bottom:12px}
.aw{background:var(--amber2);color:#92400e}
.ic{background:var(--white);border-radius:var(--r2);padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
.ic h3{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.ir{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f8fafc;font-size:14px}
.ir:last-child{border-bottom:none}
.il{color:var(--slate3);font-size:13px}
.spa{background:var(--emerald2);color:var(--emerald);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.spp{background:var(--amber2);color:var(--amber);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.spu{background:#f1f5f9;color:#64748b;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.spb{background:var(--red2);color:var(--red);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.atb{display:flex;background:#f1f5f9;border-radius:var(--r);padding:3px;gap:3px;overflow-x:auto;flex-shrink:0}
.at{flex-shrink:0;padding:7px 10px;border-radius:9px;font-size:12px;font-weight:600;color:#475569;cursor:pointer;white-space:nowrap;transition:.2s}
.at.active{background:var(--white);color:var(--navy);box-shadow:var(--shadow)}
.pi{background:var(--white);border-radius:var(--r);padding:14px;box-shadow:var(--shadow);margin-bottom:10px;border-left:4px solid var(--amber)}
.ri{width:100%;border-radius:var(--r);max-height:180px;object-fit:cover;margin:10px 0;border:1px solid var(--border)}
.es{text-align:center;padding:48px 24px;color:var(--slate3);font-size:14px}
.avc{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;flex-shrink:0;background:#eff6ff;color:#1e40af}
.stat-card{background:var(--white);border-radius:var(--r2);padding:18px;box-shadow:var(--shadow);text-align:center}
.stat-val{font-size:30px;font-weight:800;line-height:1.1}
.stat-lbl{font-size:12px;color:var(--slate3);margin-top:4px}
</style>
</head>
<body>
<div id="app">
<div class="toast" id="T"></div>
<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle dark mode">🌙</button>

<!-- LOGIN -->
<div class="screen active" id="s-login">
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:linear-gradient(160deg,#0f172a,#1e3a8a)">
    <div style="background:rgba(255,255,255,.1);border-radius:20px;padding:32px 28px;width:100%;max-width:360px">
      <div style="text-align:center;margin-bottom:28px">
        <div style="width:64px;height:64px;background:var(--blue2);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 8px 24px rgba(37,99,235,.4)">
          <svg width="34" height="34" viewBox="0 0 56 56" fill="none"><rect x="14" y="13" width="28" height="7" rx="3" fill="white"/><rect x="24.5" y="13" width="7" height="22" fill="white"/><rect x="22" y="29" width="12" height="8" rx="4" fill="white"/></svg>
        </div>
        <h1 style="font-family:'DM Serif Display',serif;font-size:24px;color:#fff">Staff Console</h1>
        <p style="font-size:13px;color:rgba(255,255,255,.6);margin-top:5px">Trusted Hands · Staff Login Only</p>
      </div>
      <div style="margin-bottom:14px"><label style="display:block;font-size:13px;font-weight:600;color:rgba(255,255,255,.8);margin-bottom:7px">Staff Email</label><input class="inp" type="email" id="le" placeholder="staff@trustedhands.com" style="background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:#fff"/></div>
      <div style="margin-bottom:18px"><label style="display:block;font-size:13px;font-weight:600;color:rgba(255,255,255,.8);margin-bottom:7px">Password</label><input class="inp" type="password" id="lp" placeholder="••••••••" style="background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:#fff"/></div>
      <div id="lerr" style="display:none" class="alert aw"></div>
      <button class="btn bp" id="lbtn" onclick="doLogin()">Access Staff Console</button>
      <p style="font-size:11px;color:rgba(255,255,255,.4);text-align:center;margin-top:16px">Staff accounts are created by the main administrator. Contact your manager if you need access.</p>
    </div>
  </div>
</div>

<!-- STAFF PANEL -->
<div class="screen" id="s-admin">
  <div style="padding:14px 16px 12px;background:var(--navy2);color:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:space-between">
    <div>
      <div style="font-family:'DM Serif Display',serif;font-size:18px">Trusted Hands Staff</div>
      <div style="font-size:11px;color:#94a3b8;margin-top:1px" id="adminEmail"></div>
    </div>
    <button onclick="doLogout()" style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">Sign Out</button>
  </div>
  <div style="padding:10px 12px 0;flex-shrink:0">
    <div class="atb" id="tabs">
      <div class="at active" onclick="aTab('overview')">📊 Overview</div>
      <div class="at" onclick="aTab('approvals')">✅ Approvals</div>
      <div class="at" onclick="aTab('artisans')">🔧 Artisans</div>
      <div class="at" onclick="aTab('customers')">👥 Customers</div>
      <div class="at" onclick="aTab('analytics')">📈 Analytics</div>
      <div class="at" onclick="aTab('disputes')">🚨 Disputes</div>
      <div class="at" onclick="aTab('pauses')">⏸️ Pauses</div>
      <div class="at" onclick="aTab('support')">🆘 Support</div>
    </div>
  </div>
  <div class="sb"><div style="padding:14px 12px 80px" id="content"></div></div>
</div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,signInWithEmailAndPassword,signOut,onAuthStateChanged,browserSessionPersistence,setPersistence}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,getDoc,setDoc,updateDoc,collection,query,where,orderBy,getDocs,onSnapshot,addDoc,serverTimestamp,runTransaction,limit}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FC={apiKey:"AIzaSyDXRdfuazcvHct7ZFlTSQY2JgV7b82lYm0",authDomain:"trust-hands-5c299.firebaseapp.com",projectId:"trust-hands-5c299",storageBucket:"trust-hands-5c299.firebasestorage.app",messagingSenderId:"481016620760",appId:"1:481016620760:web:092f40a5b74a6bc55f59ad"};
const app=initializeApp(FC),auth=getAuth(app),db=getFirestore(app);
setPersistence(auth,browserSessionPersistence).catch(()=>{});
const AE='olaowyegideon@gmail.com'; // major admin email — staff CANNOT use this email
function locStr(st,lg,ar){if(ar&&lg&&st)return ar+', '+lg;if(ar&&st)return ar+', '+st;return ar||lg||st||'—';}
let CUR_TAB='overview';
let CUR_STAFF=null; // holds the verified staff account record
const $=id=>document.getElementById(id);
const sn=s=>String(s||'').replace(/[<>"'&]/g,c=>({'<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','&':'&amp;'}[c])).trim();
const ini=n=>String(n||'').split(' ').map(x=>x[0]||'').join('').substring(0,2).toUpperCase()||'?';

function toast(m,d=3000){const t=$('T');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d)}

// ── DARK MODE TOGGLE ──
function applyTheme(theme){
  document.documentElement.setAttribute('data-theme',theme);
  const btn=$('themeToggle');
  if(btn)btn.textContent=theme==='dark'?'☀️':'🌙';
}
window.toggleTheme=function(){
  const cur=document.documentElement.getAttribute('data-theme')||'light';
  const next=cur==='dark'?'light':'dark';
  applyTheme(next);
  try{localStorage.setItem('th_staff_theme',next);}catch(e){}
};
try{
  const saved=localStorage.getItem('th_staff_theme');
  if(saved==='dark')applyTheme('dark');
}catch(e){}
function SS(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id)?.classList.add('active');}

// ── STAFF AUTHENTICATION ──
// Staff accounts live in Firestore collection 'staffAccounts', keyed by their Firebase Auth UID.
// Only the major admin (admin.html) can create/deactivate staff accounts.
// This file NEVER allows the major admin email to log in here — they must use admin.html.
onAuthStateChanged(auth,async user=>{
  if(!user){SS('s-login');CUR_STAFF=null;return;}
  // Block the major admin from using the staff console
  if(user.email.toLowerCase()===AE){
    await signOut(auth);
    $('lerr').textContent='This is the staff console. Please use the main Admin Console instead.';
    $('lerr').style.display='block';
    SS('s-login');
    return;
  }
  try{
    const staffSnap=await getDoc(doc(db,'staffAccounts',user.uid));
    if(!staffSnap.exists()||staffSnap.data().active!==true){
      await signOut(auth);
      $('lerr').textContent='Your staff account is not active. Contact your administrator.';
      $('lerr').style.display='block';
      SS('s-login');
      return;
    }
    CUR_STAFF=staffSnap.data();
    $('adminEmail').textContent=CUR_STAFF.name?CUR_STAFF.name+' · '+user.email:user.email;
    // Log staff login for audit trail
    await updateDoc(doc(db,'staffAccounts',user.uid),{lastLogin:serverTimestamp()}).catch(()=>{});
    SS('s-admin');aTab('overview');
  }catch(e){
    await signOut(auth);
    $('lerr').textContent='Verification failed. Please try again.';
    $('lerr').style.display='block';
    SS('s-login');
  }
});

window.doLogin=async function(){
  // Security: rate limit login attempts
  const now=Date.now();let attempts=[];
  try{attempts=JSON.parse(sessionStorage.getItem('_staff_la')||'[]');}catch(e){}
  attempts=attempts.filter(t=>now-t<300000);
  if(attempts.length>=5){const wait=Math.ceil((300000-(now-attempts[0]))/60000);$('lerr').textContent='Too many attempts. Wait '+wait+' minute'+(wait!==1?'s':'')+'.';$('lerr').style.display='block';return;}
  const e=$('le').value.trim().toLowerCase(),pw=$('lp').value;
  const err=$('lerr');err.style.display='none';
  if(!e||!pw){err.textContent='Please enter your email and password.';err.style.display='block';return;}
  if(e===AE){err.textContent='Please use the main Admin Console for this account.';err.style.display='block';return;}
  $('lbtn').disabled=true;$('lbtn').textContent='Signing in…';
  try{
    await signInWithEmailAndPassword(auth,e,pw);
    try{sessionStorage.removeItem('_staff_la');}catch(e2){}
  }catch(e2){
    $('lbtn').disabled=false;$('lbtn').textContent='Access Staff Console';
    attempts.push(now);try{sessionStorage.setItem('_staff_la',JSON.stringify(attempts));}catch(e3){}
    err.textContent='Incorrect email or password.';
    err.style.display='block';
  }
};
window.doLogout=async function(){await signOut(auth);CUR_STAFF=null;SS('s-login');$('lbtn').disabled=false;$('lbtn').textContent='Access Staff Console';};

window.aTab=function(t){
  // Security: hard-block restricted tabs even if called directly
  if(t==='broadcast'||t==='settings'){
    toast('🔒 This section is restricted to the main administrator.');
    return;
  }
  CUR_TAB=t;
  const keys=['overview','approvals','artisans','customers','analytics','disputes','pauses','support'];
  $('tabs').querySelectorAll('.at').forEach((el,i)=>el.classList.toggle('active',keys[i]===t));
  renderTab();
};

window.renderTab=async function(){
  const b=$('content');
  b.innerHTML=`<div style="text-align:center;padding:32px"><div class="spinner"></div></div>`;
  try{
    if(CUR_TAB==='broadcast'||CUR_TAB==='settings'){
      b.innerHTML=`<div class="es">🔒 This section is restricted to the main administrator.</div>`;
      return;
    }
    if(CUR_TAB==='overview') await renderOverview();
    else if(CUR_TAB==='approvals') await renderApprovals();
    else if(CUR_TAB==='artisans') await renderArtisans();
    else if(CUR_TAB==='customers') await renderCustomers();
    else if(CUR_TAB==='analytics') await renderAnalytics();
    else if(CUR_TAB==='disputes') await renderDisputes();
    else if(CUR_TAB==='pauses') await renderPauses();
    else if(CUR_TAB==='support') await renderSupport();
  }catch(e){b.innerHTML=`<div class="es">⚠️ Error: ${sn(e.message)}<br/><button class="btn bo bsm" style="margin-top:12px" onclick="renderTab()">Retry</button></div>`;}
};

async function renderOverview(){
  const b=$('content');
  const[uSnap,apSnap,tkSnap,bkSnap]=await Promise.all([
    getDocs(collection(db,'users')),
    getDocs(query(collection(db,'pendingApprovals'),where('reviewed','==',false))),
    getDocs(query(collection(db,'supportTickets'),where('resolved','==',false))),
    getDocs(collection(db,'bookings'))
  ]);
  const users=uSnap.docs.map(d=>d.data());
  const arts=users.filter(u=>u.type==='artisan');
  const custs=users.filter(u=>u.type==='customer');
  const active=arts.filter(u=>u.status==='active');
  const prem=active.filter(u=>u.tier==='premium');
  const std=active.filter(u=>u.tier==='standard');
  const pending=arts.filter(u=>u.status==='pending');
  const rev=(prem.length*10000)+(std.length*5000);
  const pendingAp=apSnap.docs.length;
  const openTk=tkSnap.docs.length;
  const totalBk=bkSnap.docs.length;
  const expiringSoon=active.filter(u=>{const ex=u.expiry?.toDate?u.expiry.toDate():u.expiry?new Date(u.expiry):null;return ex&&Math.round((ex-Date.now())/86400000)<=3;});
  const graceArtisans=active.filter(u=>u.timerStarted===false);
  const liveArtisans=active.filter(u=>u.timerStarted===true);
  b.innerHTML=`
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
    <div class="stat-card"><div class="stat-val" style="color:var(--blue2)">${users.length}</div><div class="stat-lbl">Total Users</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--emerald)">${active.length}</div><div class="stat-lbl">Active Artisans</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--amber)">₦${(rev/1000).toFixed(1)}k</div><div class="stat-lbl">Est. Monthly Revenue</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--navy)">${totalBk}</div><div class="stat-lbl">Total Bookings</div></div>
  </div>
  <div style="background:linear-gradient(135deg,#4c1d95,#7c3aed);border-radius:var(--r2);padding:18px;margin-bottom:14px;color:#fff">
    <div style="font-weight:700;font-size:15px;margin-bottom:4px">🚀 Launch Day Control</div>
    <div style="font-size:13px;color:rgba(255,255,255,.8);margin-bottom:14px;line-height:1.6"><strong style="color:#fde68a">${graceArtisans.length} artisan${graceArtisans.length!==1?'s':''}</strong> in grace period (timer not started)<br/><strong style="color:#4ade80">${liveArtisans.length} artisan${liveArtisans.length!==1?'s':''}</strong> already live with active timer</div>
    <button onclick="startAllTimers()" style="background:rgba(255,255,255,.2);color:#fff;border:1.5px solid rgba(255,255,255,.3);padding:10px 18px;border-radius:var(--r);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;width:100%">⏱️ START ALL TIMERS — Launch Day Action</button>
    <p style="font-size:11px;color:rgba(255,255,255,.5);margin-top:8px;text-align:center">Only tap this on your official customer launch day. It starts all 30-day subscriptions at once.</p>
  </div>
  ${pendingAp>0?`<div style="background:var(--amber2);border:1.5px solid #fde68a;border-radius:var(--r2);padding:14px;margin-bottom:12px;cursor:pointer" onclick="aTab('approvals')"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:700;font-size:14px;color:#92400e">🕐 ${pendingAp} Pending Approval${pendingAp!==1?'s':''}</div><div style="font-size:12px;color:#b45309;margin-top:2px">Tap to review payment receipts</div></div><span style="font-size:20px">→</span></div></div>`:''}
  ${openTk>0?`<div style="background:var(--red2);border:1.5px solid #fca5a5;border-radius:var(--r2);padding:14px;margin-bottom:12px;cursor:pointer" onclick="aTab('support')"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:700;font-size:14px;color:var(--red)">🆘 ${openTk} Open Support Ticket${openTk!==1?'s':''}</div><div style="font-size:12px;color:#b91c1c;margin-top:2px">Tap to respond</div></div><span style="font-size:20px">→</span></div></div>`:''}
  ${expiringSoon.length>0?`<div style="background:#fff7ed;border:1.5px solid #fed7aa;border-radius:var(--r2);padding:14px;margin-bottom:12px"><div style="font-weight:700;font-size:14px;color:#c2410c;margin-bottom:8px">⏰ ${expiringSoon.length} Artisan${expiringSoon.length!==1?'s':''} Expiring Soon</div>${expiringSoon.map(a=>`<div style="font-size:13px;color:#7c2d12;padding:4px 0;border-bottom:1px solid #fed7aa">${sn(a.name)} — ${sn(a.trade)}</div>`).join('')}</div>`:''}
  <div class="ic"><h3>📊 Platform Summary</h3>
    <div class="ir"><span class="il">Total Artisans</span><span style="font-weight:700">${arts.length}</span></div>
    <div class="ir"><span class="il">Active (Grace Period)</span><span class="spp">${graceArtisans.length}</span></div>
    <div class="ir"><span class="il">Active (Timer Live)</span><span class="spa">${liveArtisans.length}</span></div>
    <div class="ir"><span class="il">Premium</span><span class="spp">${prem.length}</span></div>
    <div class="ir"><span class="il">Standard</span><span style="font-weight:700;color:var(--blue2)">${std.length}</span></div>
    <div class="ir"><span class="il">Pending Review</span><span class="spp">${pending.length}</span></div>

async function renderAnalytics(){
  const b=$('content');
  b.innerHTML=`<div style="text-align:center;padding:32px"><div class="spinner"></div></div>`;

  const[uSnap,bSnap,paySnap]=await Promise.all([
    getDocs(collection(db,'users')),
    getDocs(collection(db,'bookings')),
    getDocs(collection(db,'payments'))
  ]);

  const users=uSnap.docs.map(d=>d.data());
  const arts=users.filter(u=>u.type==='artisan');
  const custs=users.filter(u=>u.type==='customer');
  const active=arts.filter(u=>u.status==='active');
  const prem=active.filter(u=>u.tier==='premium');
  const std=active.filter(u=>u.tier==='standard');
  const grantedFree=arts.filter(u=>u.grantedByAdmin===true).length;
  const totalRev=(prem.length*10000)+(std.length*5000);
  const bookings=bSnap.docs.length;

  // ── SIGNUP CHART (last 6 months) ──
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const now=new Date();
  const mA=Array(12).fill(0),mC=Array(12).fill(0),mR=Array(12).fill(0);
  arts.forEach(a=>{
    const d=a.createdAt?.toDate?a.createdAt.toDate():null;
    if(d&&d.getFullYear()===now.getFullYear()){
      mA[d.getMonth()]++;
      mR[d.getMonth()]+=(a.tier==='premium'?10000:a.tier==='standard'?5000:0);
    }
  });
  custs.forEach(c=>{const d=c.createdAt?.toDate?c.createdAt.toDate():null;if(d&&d.getFullYear()===now.getFullYear())mC[d.getMonth()]++;});
  const last6=[];for(let i=5;i>=0;i--){const m=(now.getMonth()-i+12)%12;last6.push({label:months[m],a:mA[m],c:mC[m],r:mR[m]});}
  const maxB=Math.max(...last6.map(m=>m.a+m.c),1);
  const bars=last6.map(m=>{
    const aH=Math.round((m.a/maxB)*110);const cH=Math.round((m.c/maxB)*110);
    return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
      <div style="font-size:9px;color:var(--slate3)">${m.a+m.c||''}</div>
      <div style="width:100%;display:flex;flex-direction:column;gap:1px">
        <div style="height:${aH}px;background:var(--blue2);border-radius:3px 3px 0 0;min-height:${m.a?3:0}px"></div>
        <div style="height:${cH}px;background:#34d399;border-radius:0 0 3px 3px;min-height:${m.c?3:0}px"></div>
      </div>
      <div style="font-size:9px;color:var(--slate3)">${m.label}</div>
    </div>`;
  }).join('');

  // Revenue bars per month
  const maxR=Math.max(...last6.map(m=>m.r),1);
  const revBars=last6.map(m=>{
    const h=Math.round((m.r/maxR)*80);
    return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
      <div style="font-size:9px;color:var(--amber);font-weight:600">${m.r?'₦'+(m.r/1000).toFixed(0)+'k':''}</div>
      <div style="width:100%;height:${h}px;background:var(--amber);border-radius:3px 3px 0 0;min-height:${m.r?3:0}px"></div>
      <div style="font-size:9px;color:var(--slate3)">${m.label}</div>
    </div>`;
  }).join('');

  // ── TRADE BREAKDOWN ──
  const tC={};arts.forEach(a=>{if(a.trade)tC[a.trade]=(tC[a.trade]||0)+1;});
  const tRev={};active.forEach(a=>{if(a.trade)tRev[a.trade]=(tRev[a.trade]||0)+(a.tier==='premium'?10000:5000);});
  const tS=Object.entries(tC).sort((a,bx)=>bx[1]-a[1]);
  const maxT=Math.max(...tS.map(t=>t[1]),1);
  const tRows=tS.map(([tr,ct])=>{
    const r=tRev[tr]||0;
    return`<div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
        <span style="font-weight:600">${tr}</span>
        <div style="text-align:right"><span style="color:var(--slate3)">${ct} artisan${ct!==1?'s':''}</span>${r?` · <span style="color:var(--emerald);font-weight:700">₦${r.toLocaleString()}</span>`:''}
        </div>
      </div>
      <div style="height:9px;background:#f1f5f9;border-radius:20px;overflow:hidden">
        <div style="height:100%;width:${Math.round((ct/maxT)*100)}%;background:var(--blue2);border-radius:20px"></div>
      </div>
    </div>`;
  }).join('')||'<div style="font-size:13px;color:var(--slate3)">No artisans yet.</div>';

  // ── GEOGRAPHIC REVENUE BREAKDOWN ──
  // By State
  const stateData={};
  active.forEach(a=>{
    const st=a.state||'Unknown';
    if(!stateData[st])stateData[st]={artisans:0,premium:0,standard:0,revenue:0,lgas:{}};
    stateData[st].artisans++;
    if(a.tier==='premium'){stateData[st].premium++;stateData[st].revenue+=10000;}
    else if(a.tier==='standard'){stateData[st].standard++;stateData[st].revenue+=5000;}
    // By LGA
    const lg=a.lga||'Unknown LGA';
    if(!stateData[st].lgas[lg])stateData[st].lgas[lg]={artisans:0,premium:0,standard:0,revenue:0,areas:{}};
    stateData[st].lgas[lg].artisans++;
    if(a.tier==='premium'){stateData[st].lgas[lg].premium++;stateData[st].lgas[lg].revenue+=10000;}
    else if(a.tier==='standard'){stateData[st].lgas[lg].standard++;stateData[st].lgas[lg].revenue+=5000;}
    // By Area/Zone
    const ar=a.zone||'Unknown Area';
    if(!stateData[st].lgas[lg].areas[ar])stateData[st].lgas[lg].areas[ar]={artisans:0,premium:0,standard:0,revenue:0};
    stateData[st].lgas[lg].areas[ar].artisans++;
    if(a.tier==='premium'){stateData[st].lgas[lg].areas[ar].premium++;stateData[st].lgas[lg].areas[ar].revenue+=10000;}
    else if(a.tier==='standard'){stateData[st].lgas[lg].areas[ar].standard++;stateData[st].lgas[lg].areas[ar].revenue+=5000;}
  });

  const maxStateRev=Math.max(...Object.values(stateData).map(s=>s.revenue),1);

  const geoHTML=Object.entries(stateData).sort((a,bx)=>bx[1].revenue-a[1].revenue).map(([st,sd])=>{
    const stPct=Math.round((sd.revenue/totalRev)*100)||0;
    const barW=Math.round((sd.revenue/maxStateRev)*100);

    // LGA rows
    const lgaHTML=Object.entries(sd.lgas).sort((a,bx)=>bx[1].revenue-a[1].revenue).map(([lg,ld])=>{
      const lgPct=sd.revenue?Math.round((ld.revenue/sd.revenue)*100):0;

      // Area rows
      const areaHTML=Object.entries(ld.areas).sort((a,bx)=>bx[1].revenue-a[1].revenue).map(([ar,ad])=>{
        return`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0 5px 12px;border-bottom:1px solid #f8fafc">
          <div style="font-size:12px;color:#475569">📍 ${ar}</div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:12px;font-weight:700;color:var(--emerald)">${ad.revenue?'₦'+ad.revenue.toLocaleString():'₦0'}</div>
            <div style="font-size:10px;color:var(--slate3)">${ad.artisans} artisan${ad.artisans!==1?'s':''}${ad.premium?` · ${ad.premium}⭐`:''}${ad.standard?` · ${ad.standard} std`:''}</div>
          </div>
        </div>`;
      }).join('');

      return`<div style="border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden">
        <div onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'" style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#f8fafc;cursor:pointer">
          <div>
            <div style="font-size:13px;font-weight:700;color:var(--navy)">${lg}</div>
            <div style="font-size:11px;color:var(--slate3);margin-top:1px">${ld.artisans} artisan${ld.artisans!==1?'s':''} · ${lgPct}% of state revenue</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:14px;font-weight:800;color:var(--emerald)">${ld.revenue?'₦'+ld.revenue.toLocaleString():'₦0'}</div>
            <div style="font-size:10px;color:var(--slate3)">${ld.premium?ld.premium+'⭐ ':''} ${ld.standard?ld.standard+' std':''}</div>
          </div>
        </div>
        <div style="display:none">${areaHTML||'<div style="padding:10px 12px;font-size:12px;color:var(--slate3)">No area data</div>'}</div>
      </div>`;
    }).join('');

    return`<div style="background:var(--white);border-radius:var(--r2);padding:16px;box-shadow:var(--shadow);margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div>
          <div style="font-size:15px;font-weight:700;color:var(--navy)">🗺️ ${st}</div>
          <div style="font-size:12px;color:var(--slate3);margin-top:2px">${sd.artisans} active artisans · ${stPct}% of total revenue</div>
          <div style="display:flex;gap:8px;margin-top:4px">
            ${sd.premium?`<span style="background:var(--amber2);color:var(--amber);padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700">⭐ ${sd.premium} Premium</span>`:''}
            ${sd.standard?`<span style="background:var(--blue3);color:var(--blue2);padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700">${sd.standard} Standard</span>`:''}
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:12px">
          <div style="font-size:20px;font-weight:800;color:var(--emerald)">₦${sd.revenue.toLocaleString()}</div>
          <div style="font-size:11px;color:var(--slate3)">/month</div>
        </div>
      </div>
      <div style="height:10px;background:#f1f5f9;border-radius:20px;overflow:hidden;margin-bottom:14px">
        <div style="height:100%;width:${barW}%;background:linear-gradient(90deg,var(--emerald),#34d399);border-radius:20px;transition:.4s"></div>
      </div>
      <div style="font-size:11px;font-weight:700;color:var(--slate3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">LGA / City Breakdown (tap to expand areas)</div>
      ${lgaHTML||'<div style="font-size:12px;color:var(--slate3)">No LGA data yet</div>'}
    </div>`;
  }).join('')||`<div class="es">No active artisans with location data yet.</div>`;

  // ── AREA LEADERBOARD (top 10 earning areas across all states) ──
  const allAreas={};
  active.forEach(a=>{
    const key=(a.zone||'Unknown')+(a.lga?', '+a.lga:'')+(a.state?', '+a.state:'');
    if(!allAreas[key])allAreas[key]={name:a.zone||'Unknown',lga:a.lga||'',state:a.state||'',artisans:0,revenue:0,premium:0};
    allAreas[key].artisans++;allAreas[key].revenue+=(a.tier==='premium'?10000:5000);
    if(a.tier==='premium')allAreas[key].premium++;
  });
  const topAreas=Object.values(allAreas).sort((a,bx)=>bx.revenue-a.revenue).slice(0,10);
  const maxAreaRev=Math.max(...topAreas.map(a=>a.revenue),1);
  const areaLeaderboard=topAreas.map((a,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f8fafc">
    <div style="width:22px;height:22px;border-radius:50%;background:${i===0?'var(--amber)':i===1?'#94a3b8':i===2?'#b45309':'var(--blue3)'};color:${i<3?'#fff':'var(--blue2)'};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0">${i+1}</div>
    <div style="flex:1;min-width:0">
      <div style="font-size:13px;font-weight:700;color:var(--navy)">${a.name}</div>
      <div style="font-size:11px;color:var(--slate3)">${a.lga}${a.state?', '+a.state:''}</div>
      <div style="height:5px;background:#f1f5f9;border-radius:20px;overflow:hidden;margin-top:4px"><div style="height:100%;width:${Math.round((a.revenue/maxAreaRev)*100)}%;background:var(--emerald);border-radius:20px"></div></div>
    </div>
    <div style="text-align:right;flex-shrink:0">
      <div style="font-size:13px;font-weight:800;color:var(--emerald)">₦${a.revenue.toLocaleString()}</div>
      <div style="font-size:10px;color:var(--slate3)">${a.artisans} artisan${a.artisans!==1?'s':''}${a.premium?' · '+a.premium+'⭐':''}</div>
    </div>
  </div>`).join('')||'<div style="font-size:13px;color:var(--slate3)">No data yet.</div>';

  b.innerHTML=`
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
    <div class="stat-card"><div class="stat-val" style="color:var(--blue2)">${arts.length}</div><div class="stat-lbl">Total Artisans</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--emerald)">${custs.length}</div><div class="stat-lbl">Customers</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--amber)">₦${(totalRev/1000).toFixed(1)}k</div><div class="stat-lbl">Monthly Revenue</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--navy)">${bookings}</div><div class="stat-lbl">Bookings</div></div>
  </div>

  <div class="ic"><h3>📈 Signups — Last 6 Months</h3>
    <div style="display:flex;align-items:flex-end;gap:6px;height:140px;margin-bottom:10px">${bars}</div>
    <div style="display:flex;gap:14px;font-size:12px">
      <div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;background:var(--blue2);border-radius:2px"></div><span style="color:var(--slate3)">Artisans (${arts.length})</span></div>
      <div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;background:#34d399;border-radius:2px"></div><span style="color:var(--slate3)">Customers (${custs.length})</span></div>
    </div>
  </div>

  <div class="ic"><h3>💰 Monthly Revenue Trend</h3>
    <div style="display:flex;align-items:flex-end;gap:6px;height:100px;margin-bottom:8px">${revBars}</div>
    <div style="font-size:11px;color:var(--slate3)">Revenue generated from subscriptions each month this year</div>
  </div>

  <div class="ic"><h3>💰 Revenue Breakdown</h3>
    <div class="ir"><span class="il">Premium ×${prem.length}</span><span style="font-weight:700;color:var(--amber)">₦${(prem.length*10000).toLocaleString()}</span></div>
    <div class="ir"><span class="il">Standard ×${std.length}</span><span style="font-weight:700;color:var(--blue2)">₦${(std.length*5000).toLocaleString()}</span></div>
    <div class="ir"><span class="il">Free Grants</span><span style="font-weight:700;color:var(--slate3)">${grantedFree} artisan${grantedFree!==1?'s':''} (₦0)</span></div>
    <div class="ir"><span class="il" style="font-weight:700">Monthly Total</span><span style="font-weight:800;font-size:16px;color:var(--emerald)">₦${totalRev.toLocaleString()}</span></div>
    ${totalRev>0?`<div style="margin-top:12px;height:18px;border-radius:20px;overflow:hidden;background:#f1f5f9;display:flex">
      <div style="width:${Math.round(prem.length*10000/totalRev*100)}%;background:var(--amber);height:100%"></div>
      <div style="width:${Math.round(std.length*5000/totalRev*100)}%;background:var(--blue2);height:100%"></div>
    </div><div style="display:flex;gap:12px;font-size:11px;color:var(--slate3);margin-top:5px"><span>🟡 Premium</span><span>🔵 Standard</span></div>`:''}
  </div>

  <div class="ic"><h3>🏆 Top 10 Earning Areas</h3>
    <p style="font-size:12px;color:var(--slate3);margin-bottom:10px">Areas ranked by total monthly subscription revenue</p>
    ${areaLeaderboard}
  </div>

  <div style="margin-bottom:14px">
    <div style="font-size:15px;font-weight:700;color:var(--navy);margin-bottom:4px">💵 Revenue by State → LGA → Area</div>
    <p style="font-size:12px;color:var(--slate3);margin-bottom:12px">Tap any LGA to see individual area breakdown</p>
    ${geoHTML}
  </div>

  <div class="ic"><h3>🔧 Artisans by Trade</h3>${tRows}</div>`;
}


async function renderSupport(){
  const b=$('content');
  const snap=await getDocs(query(collection(db,'supportTickets'),limit(100)));
  if(snap.empty){b.innerHTML=`<div class="es"><div style="font-size:40px;margin-bottom:10px">🎉</div>No support tickets.</div>`;return;}

  await addDoc(collection(db,'supportNotes'),{toUid:uid,toName:name,message:'⚠️ FORMAL WARNING: A customer dispute has been filed against your account. '+note+' Further violations may result in permanent ban.',sentAt:serverTimestamp(),sentBy:'Admin'});

window.sendDisputeNote=async function(id,reporterUid,artisanUid){
  const note=sn(document.getElementById('dnote_'+id)?.value?.trim()||'');
  if(!note){toast('Please type a note first.');return;}
  const snap=await getDocs(query(collection(db,'disputes'),where('__name__','==',id)));
  const data=snap.docs[0]?.data()||{};
  if(reporterUid)await addDoc(collection(db,'supportNotes'),{toUid:reporterUid,toName:data.reporterName||'',message:'📋 Admin update on your dispute report: '+note,sentAt:serverTimestamp(),sentBy:'Admin'});
  if(artisanUid)await addDoc(collection(db,'supportNotes'),{toUid:artisanUid,toName:data.artisanName||'',message:'📋 Admin note regarding dispute filed against you: '+note,sentAt:serverTimestamp(),sentBy:'Admin'});
  await updateDoc(doc(db,'disputes',id),{adminNote:note});
  toast('Notes sent to both parties ✅');
};
window.approvePause=async function(uid,docId,days){
  const expSnap=await getDoc(doc(db,'users',uid));
  const cur=expSnap.data();
  const curExpiry=cur.expiry?.toDate?cur.expiry.toDate():cur.expiry?new Date(cur.expiry):new Date();
  const newExpiry=new Date(curExpiry.getTime()+(days*86400000));
  await updateDoc(doc(db,'users',uid),{expiry:newExpiry,pauseDaysUsed:(cur.pauseDaysUsed||0)+days,pauseUsed:true,pausePending:false,status:'active'});
  await updateDoc(doc(db,'pauseRequests',docId),{reviewed:true,approved:true,approvedAt:serverTimestamp()});
  toast(`✅ Pause approved. ${days} day${days!==1?'s':''} added to subscription.`);renderPauses();
};
window.rejectPause=async function(uid,docId){
  await updateDoc(doc(db,'users',uid),{pausePending:false});

  toast('Pause request rejected.');renderPauses();
};

};
window.clBCTarget=async function(key){
  await setDoc(doc(db,'config',key),{text:'',updatedAt:serverTimestamp()});
  toast('Broadcast cleared.');
  renderBroadcast();
};
window.rsTk=async function(id){await updateDoc(doc(db,'supportTickets',id),{resolved:true,resolvedAt:serverTimestamp()});toast('Ticket resolved ✅');renderTab();};
window.rpTk=async function(id,uid,name){
  const t=document.getElementById('rep_'+id)?.value?.trim();if(!t){toast('Type a reply first.');return;}
  await addDoc(collection(db,'supportNotes'),{toUid:uid,toName:name,message:t,sentAt:serverTimestamp(),sentBy:'Admin'});
  await updateDoc(doc(db,'supportTickets',id),{resolved:true,resolvedAt:serverTimestamp(),adminReply:t});
  toast('Reply sent & ticket resolved ✅');renderTab();
};
</script>
</body>
