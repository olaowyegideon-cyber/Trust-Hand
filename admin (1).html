<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trusted Hands — Admin Console</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f172a;--navy2:#1e293b;--slate:#334155;--slate2:#475569;--slate3:#64748b;
  --blue:#1d4ed8;--blue2:#2563eb;--blue3:#eff6ff;
  --emerald:#059669;--emerald2:#d1fae5;
  --amber:#d97706;--amber2:#fef3c7;
  --red:#dc2626;--red2:#fee2e2;
  --bg:#f8fafc;--white:#fff;--border:#e2e8f0;
  --shadow:0 1px 3px rgba(0,0,0,.08);--shadow2:0 4px 20px rgba(0,0,0,.10);
  --r:12px;--r2:16px;--r3:20px;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--navy);font-size:14px;min-height:100vh}
.hidden{display:none!important}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue2);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy2);color:#fff;padding:10px 22px;border-radius:24px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.btn{padding:10px 18px;border-radius:var(--r);font-weight:700;font-size:13px;cursor:pointer;border:none;font-family:inherit;transition:.2s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--blue2);color:#fff}
.btn-success{background:var(--emerald);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-outline{background:var(--white);color:var(--blue2);border:1.5px solid var(--blue2)}
.btn-amber{background:var(--amber);color:#fff}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:20px}
.btn-full{width:100%}
.inp{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--r);font-size:13px;font-family:inherit;color:var(--navy);outline:none;transition:.2s;background:var(--white)}
.inp:focus{border-color:var(--blue2);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.card{background:var(--white);border-radius:var(--r2);padding:18px;box-shadow:var(--shadow);margin-bottom:12px}
.card h3{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f8fafc;font-size:13px}
.row:last-child{border-bottom:none}
.lbl{color:var(--slate3);font-size:12px}
.pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block}
.pill-active{background:var(--emerald2);color:var(--emerald)}
.pill-pending{background:var(--amber2);color:var(--amber)}
.pill-unsubscribed{background:#f1f5f9;color:var(--slate3)}
.pill-banned{background:var(--red2);color:var(--red)}
.tab-bar{display:flex;background:#f1f5f9;border-radius:var(--r);padding:3px;gap:3px;overflow-x:auto}
.tab{flex-shrink:0;padding:7px 10px;border-radius:9px;font-size:12px;font-weight:600;color:var(--slate2);cursor:pointer;transition:.2s;white-space:nowrap}
.tab.active{background:var(--white);color:var(--navy);box-shadow:var(--shadow)}
.avatar{width:38px;height:38px;border-radius:50%;background:#eff6ff;color:#1e40af;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.stat-box{background:var(--white);border-radius:var(--r);padding:14px;box-shadow:var(--shadow);text-align:center}
.stat-num{font-size:28px;font-weight:800;color:var(--navy)}
.stat-lbl{font-size:11px;color:var(--slate3);margin-top:2px}
.pending-card{border-radius:var(--r);padding:16px;box-shadow:var(--shadow);margin-bottom:10px;border-left:4px solid var(--amber);background:var(--white)}
.receipt-img{width:100%;border-radius:var(--r);max-height:180px;object-fit:cover;margin:10px 0;border:1px solid var(--border)}
.user-row{display:flex;gap:10px;align-items:center;padding:11px 0;border-bottom:1px solid #f8fafc;cursor:pointer;transition:.15s}
.user-row:hover{background:#fafbff;padding-left:4px;border-radius:4px}
.user-row:last-child{border-bottom:none}
.empty{text-align:center;padding:40px 20px;color:var(--slate3)}
.empty .icon{font-size:36px;margin-bottom:10px}
.alert{border-radius:var(--r);padding:12px 14px;font-size:13px;margin-bottom:12px}
.alert-warn{background:var(--amber2);color:#92400e}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#0f172a,#1e3a8a)}
.login-card{background:var(--white);border-radius:24px;padding:32px 24px;box-shadow:var(--shadow2);width:100%;max-width:380px}
.login-logo{text-align:center;margin-bottom:24px}
.logo-box{width:64px;height:64px;background:var(--blue2);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 10px 30px rgba(37,99,235,.4)}
.login-card h1{font-family:'DM Serif Display',serif;font-size:24px;color:var(--navy);text-align:center;margin-bottom:4px}
.login-card p{font-size:13px;color:var(--slate3);text-align:center;margin-bottom:22px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:700;color:var(--navy);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}

/* HEADER */
#mainScreen{display:none;min-height:100vh;flex-direction:column}
.header{background:var(--navy2);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.header-logo{display:flex;align-items:center;gap:10px;color:#fff;font-weight:800;font-size:16px}
.header-right{display:flex;align-items:center;gap:10px}
.header-badge{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600}
.signout-btn{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}
.signout-btn:hover{background:rgba(255,255,255,.2)}
.content{padding:16px;flex:1;padding-bottom:80px;max-width:600px;margin:0 auto;width:100%}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-box">
        <svg width="36" height="36" viewBox="0 0 56 56" fill="none">
          <rect x="14" y="13" width="28" height="7" rx="3" fill="white"/>
          <rect x="24.5" y="13" width="7" height="22" fill="white"/>
          <rect x="22" y="29" width="12" height="8" rx="4" fill="white"/>
          <rect x="17" y="23" width="5" height="11" rx="2.5" fill="white" transform="rotate(-12 19 28)"/>
          <rect x="34" y="23" width="5" height="11" rx="2.5" fill="white" transform="rotate(12 37 28)"/>
        </svg>
      </div>
      <h1>Admin Console</h1>
      <p>Trusted Hands — Gideon's Command Centre<br/>Authorized access only</p>
    </div>
    <div class="form-group"><label>Admin Email</label><input class="inp" type="email" id="adminEmail" placeholder="your@email.com" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <div class="form-group"><label>Password</label><input class="inp" type="password" id="adminPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <div id="loginErr" style="display:none" class="alert alert-warn"></div>
    <button class="btn btn-primary btn-full" onclick="doLogin()">Access Admin Console</button>
  </div>
</div>

<!-- MAIN -->
<div id="mainScreen">
  <div class="header">
    <div class="header-logo">
      <div style="width:32px;height:32px;background:var(--blue2);border-radius:8px;display:flex;align-items:center;justify-content:center">
        <svg width="18" height="18" viewBox="0 0 56 56" fill="none"><rect x="14" y="13" width="28" height="7" rx="3" fill="white"/><rect x="24.5" y="13" width="7" height="22" fill="white"/><rect x="22" y="29" width="12" height="8" rx="4" fill="white"/><rect x="17" y="23" width="5" height="11" rx="2.5" fill="white" transform="rotate(-12 19 28)"/><rect x="34" y="23" width="5" height="11" rx="2.5" fill="white" transform="rotate(12 37 28)"/></svg>
      </div>
      <span>Admin Console</span>
    </div>
    <div class="header-right">
      <span class="header-badge" id="headerBadge">Loading…</span>
      <button class="signout-btn" onclick="doLogout()">Sign Out</button>
    </div>
  </div>

  <div class="content">
    <div class="tab-bar" id="tabBar" style="margin-bottom:16px">
      <div class="tab active" onclick="switchTab('overview')">📊 Overview</div>
      <div class="tab" onclick="switchTab('approvals')">✅ Approvals</div>
      <div class="tab" onclick="switchTab('artisans')">🔧 Artisans</div>
      <div class="tab" onclick="switchTab('customers')">👥 Customers</div>
      <div class="tab" onclick="switchTab('bookings')">📅 Bookings</div>
      <div class="tab" onclick="switchTab('reviews')">⭐ Reviews</div>
      <div class="tab" onclick="switchTab('support')">🆘 Support</div>
      <div class="tab" onclick="switchTab('broadcast')">📢 Broadcast</div>
      <div class="tab" onclick="switchTab('settings')">⚙️ Settings</div>
    </div>
    <div id="tabContent"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, getDoc, getDocs, updateDoc, addDoc, deleteDoc,
  setDoc, query, where, orderBy, limit, runTransaction, serverTimestamp, getCountFromServer }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDXRdfuazcvHct7ZFlTSQY2JgV7b82lYm0",
  authDomain: "trust-hands-5c299.firebaseapp.com",
  projectId: "trust-hands-5c299",
  storageBucket: "trust-hands-5c299.firebasestorage.app",
  messagingSenderId: "481016620760",
  appId: "1:481016620760:web:092f40a5b74a6bc55f59ad"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
const ADMIN_EMAIL='olaowyegideon@gmail.com';
let currentTab='overview';

function $(id){return document.getElementById(id)}
function toast(msg,dur=3200){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur)}
function initials(n){return String(n||'').split(' ').map(x=>x[0]||'').join('').substring(0,2).toUpperCase()||'?'}
function san(s){return String(s||'').replace(/[<>"'&]/g,c=>({'<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','&':'&amp;'}[c])).trim()}
function fmtDate(ts){if(!ts)return'—';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}

// AUTH
onAuthStateChanged(auth,user=>{
  if(user&&user.email.toLowerCase()===ADMIN_EMAIL){
    $('loginScreen').style.display='none';
    $('mainScreen').style.display='flex';
    loadTab('overview');
  } else if(user){
    signOut(auth);
    showErr('Access denied. Admin only.');
  }
});

window.doLogin=async function(){
  const email=$('adminEmail').value.trim().toLowerCase();
  const pass=$('adminPass').value;
  hideErr();
  if(!email||!pass){showErr('Please enter email and password.');return}
  if(email!==ADMIN_EMAIL){showErr('Access denied.');return}
  try{await signInWithEmailAndPassword(auth,email,pass);}
  catch(err){showErr(err.code==='auth/invalid-credential'||err.code==='auth/wrong-password'?'Incorrect password.':'Login failed: '+err.message);}
};

window.doLogout=async function(){
  await signOut(auth);
  $('mainScreen').style.display='none';
  $('loginScreen').style.display='flex';
  toast('Signed out.');
};

function showErr(m){$('loginErr').textContent=m;$('loginErr').style.display='block'}
function hideErr(){$('loginErr').style.display='none'}

// TABS
window.switchTab=function(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  loadTab(tab);
};

async function loadTab(tab){
  const body=$('tabContent');
  body.innerHTML=`<div style="text-align:center;padding:40px"><div class="spinner"></div></div>`;
  try{
    if(tab==='overview') await renderOverview();
    else if(tab==='approvals') await renderApprovals();
    else if(tab==='artisans') await renderArtisans();
    else if(tab==='customers') await renderCustomers();
    else if(tab==='bookings') await renderBookings();
    else if(tab==='reviews') await renderReviews();
    else if(tab==='support') await renderSupport();
    else if(tab==='broadcast') renderBroadcast();
    else if(tab==='settings') renderSettings();
  }catch(err){
    body.innerHTML=`<div class="empty"><div class="icon">⚠️</div>Error: ${san(err.message)}<br/><br/><button class="btn btn-outline btn-sm" onclick="loadTab('${tab}')">Retry</button></div>`;
  }
}

// ── OVERVIEW ─────────────────────────────────────────────────────────────────
async function renderOverview(){
  const body=$('tabContent');
  const [usersSnap,approvalSnap,bookingsSnap,reviewsSnap,ticketsSnap]=await Promise.all([
    getDocs(collection(db,'users')),
    getDocs(query(collection(db,'pendingApprovals'),where('reviewed','==',false))),
    getDocs(collection(db,'bookings')),
    getDocs(collection(db,'reviews')),
    getDocs(query(collection(db,'supportTickets'),where('resolved','==',false)))
  ]);
  const users=usersSnap.docs.map(d=>d.data());
  const artisans=users.filter(u=>u.type==='artisan');
  const customers=users.filter(u=>u.type==='customer');
  const active=artisans.filter(u=>u.status==='active');
  const pending=artisans.filter(u=>u.status==='pending');
  const unsub=artisans.filter(u=>u.status==='unsubscribed');
  const premiums=artisans.filter(u=>u.tier==='premium'&&u.status==='active');
  // Update header badge
  $('headerBadge').textContent=approvalSnap.docs.length?`${approvalSnap.docs.length} pending`:'All clear ✓';
  // Revenue estimate
  const revenue=(active.filter(u=>u.tier==='premium').length*5000)+(active.filter(u=>u.tier==='standard').length*2000);
  body.innerHTML=`
    <div class="card">
      <h3>📊 Platform Overview</h3>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:4px">
        <div class="stat-box"><div class="stat-num">${customers.length}</div><div class="stat-lbl">Customers</div></div>
        <div class="stat-box"><div class="stat-num">${artisans.length}</div><div class="stat-lbl">Artisans</div></div>
        <div class="stat-box" style="border:1.5px solid var(--emerald2)"><div class="stat-num" style="color:var(--emerald)">${active.length}</div><div class="stat-lbl">Active Artisans</div></div>
        <div class="stat-box" style="border:1.5px solid var(--amber2)"><div class="stat-num" style="color:var(--amber)">${pending.length}</div><div class="stat-lbl">Pending Approval</div></div>
        <div class="stat-box"><div class="stat-num">${unsub.length}</div><div class="stat-lbl">Unsubscribed</div></div>
        <div class="stat-box" style="border:1.5px solid var(--amber2)"><div class="stat-num" style="color:var(--gold)">⭐${premiums.length}</div><div class="stat-lbl">Premium Artisans</div></div>
      </div>
    </div>
    <div class="card">
      <h3>💰 Revenue Snapshot</h3>
      <div class="row"><span class="lbl">Est. Monthly Revenue</span><strong style="color:var(--emerald);font-size:16px">₦${revenue.toLocaleString()}</strong></div>
      <div class="row"><span class="lbl">Standard subscribers</span><span>${active.filter(u=>u.tier==='standard').length} × ₦2,000</span></div>
      <div class="row"><span class="lbl">Premium subscribers</span><span>${premiums.length} × ₦5,000</span></div>
      <div class="row"><span class="lbl">Total bookings</span><span>${bookingsSnap.docs.length}</span></div>
      <div class="row"><span class="lbl">Total reviews</span><span>${reviewsSnap.docs.length}</span></div>
    </div>
    <div class="card">
      <h3>🔔 Action Required</h3>
      ${approvalSnap.docs.length?`<div style="background:var(--amber2);border-radius:var(--r);padding:12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-weight:700;font-size:13px">⏳ ${approvalSnap.docs.length} pending approval${approvalSnap.docs.length!==1?'s':''}</div><div style="font-size:12px;color:var(--amber)">Review payment proofs</div></div>
        <button class="btn btn-amber btn-sm" onclick="switchTabDirect('approvals')">Review →</button>
      </div>`:'<div style="color:var(--slate3);font-size:13px">✅ No pending approvals</div>'}
      ${ticketsSnap.docs.length?`<div style="background:var(--red2);border-radius:var(--r);padding:12px;margin-top:8px;display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-weight:700;font-size:13px">🆘 ${ticketsSnap.docs.length} open support ticket${ticketsSnap.docs.length!==1?'s':''}</div><div style="font-size:12px;color:var(--red)">Users need help</div></div>
        <button class="btn btn-danger btn-sm" onclick="switchTabDirect('support')">View →</button>
      </div>`:''}
    </div>
    <div class="card">
      <h3>📍 Artisans by Zone</h3>
      ${renderZoneBreakdown(artisans)}
    </div>
    <div class="card">
      <h3>🔧 Artisans by Trade</h3>
      ${renderTradeBreakdown(artisans)}
    </div>`;
}

window.switchTabDirect=function(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach((t,i)=>
    t.classList.toggle('active',['overview','approvals','artisans','customers','bookings','reviews','support','broadcast','settings'][i]===tab)
  );
  loadTab(tab);
};

function renderZoneBreakdown(artisans){
  const zones=['Market Square Area','Ojo Street','School Gate Area','Igor / Uhumudumu','Alli Square','Abelmen Area','GT Extension','Ujemen','Ujuenle','Emado'];
  return zones.map(z=>{
    const count=artisans.filter(a=>a.zone===z).length;
    const active=artisans.filter(a=>a.zone===z&&a.status==='active').length;
    if(!count) return '';
    return `<div class="row"><span>${san(z)}</span><span style="font-size:12px"><strong>${count}</strong> total · <span style="color:var(--emerald)">${active} active</span></span></div>`;
  }).join('');
}

function renderTradeBreakdown(artisans){
  const trades=['Cleaners','Electricians','Plumbers','Tailors/Hairdressers','Mechanics','Dry Cleaners','Bricklayer / Construction Manager'];
  return trades.map(t=>{
    const count=artisans.filter(a=>a.trade===t).length;
    if(!count) return '';
    return `<div class="row"><span>${san(t)}</span><span><strong>${count}</strong> artisan${count!==1?'s':''}</span></div>`;
  }).join('');
}

// ── APPROVALS ─────────────────────────────────────────────────────────────────
async function renderApprovals(){
  const body=$('tabContent');
  const snap=await getDocs(query(collection(db,'pendingApprovals'),where('reviewed','==',false)));
  if(snap.empty){body.innerHTML=`<div class="empty"><div class="icon">✅</div>No pending approvals right now.<br/><br/><div style="font-size:13px">All payment submissions have been reviewed.</div></div>`;return}
  body.innerHTML=`<div style="font-size:13px;color:var(--slate3);margin-bottom:12px;font-weight:600">${snap.docs.length} pending payment${snap.docs.length!==1?'s':''} awaiting review</div>`+
  snap.docs.map(d=>{
    const p=d.data();
    return`<div class="pending-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div>
          <div style="font-weight:700;font-size:15px;color:var(--navy)">${san(p.name)}</div>
          <div style="font-size:12px;color:var(--slate3);line-height:1.8;margin-top:4px">
            🔧 ${san(p.trade)}<br/>📍 ${san(p.zone)}<br/>
            💳 Tier: <strong style="color:var(--blue2)">${san(p.tier)}</strong><br/>
            🏦 Sender: ${san(p.senderBank)}<br/>
            📅 Submitted: ${fmtDate(p.submittedAt)}
          </div>
        </div>
        <span class="pill pill-pending">Pending</span>
      </div>
      ${p.receiptBase64?`<img src="${p.receiptBase64}" class="receipt-img" onclick="this.style.maxHeight=this.style.maxHeight==='none'?'180px':'none'" title="Tap to expand"/>`:`<div style="background:#f1f5f9;border-radius:var(--r);padding:12px;text-align:center;font-size:12px;color:var(--slate3);margin:10px 0">🧾 Receipt submitted</div>`}
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-success btn-sm" style="flex:1" onclick="approveArtisan('${p.artisanUid}','${d.id}','${p.tier}')">✓ Approve & Activate</button>
        <button class="btn btn-danger btn-sm" onclick="rejectArtisan('${d.id}','${p.artisanUid}')">✕ Reject</button>
      </div>
    </div>`;
  }).join('');
}

window.approveArtisan=async function(uid,docId,tierLabel){
  const tier=tierLabel.toLowerCase().includes('premium')?'premium':'standard';
  const expiry=new Date(Date.now()+2592000000);
  try{
    await runTransaction(db,async txn=>{
      txn.update(doc(db,'users',uid),{status:'active',tier,expiry,activatedAt:serverTimestamp()});
      txn.update(doc(db,'pendingApprovals',docId),{reviewed:true,approvedAt:serverTimestamp()});
    });

// ── ARTISANS ──────────────────────────────────────────────────────────────────
async function renderArtisans(){
  const body=$('tabContent');
  const snap=await getDocs(query(collection(db,'users'),where('type','==','artisan')));
  const artisans=snap.docs.map(d=>({id:d.id,...d.data()}));
  window._artisans=artisans;
  if(!artisans.length){body.innerHTML=`<div class="empty"><div class="icon">🔧</div>No artisans registered yet.</div>`;return}
  const active=artisans.filter(a=>a.status==='active').length;
  const pending=artisans.filter(a=>a.status==='pending').length;
  body.innerHTML=`
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num">${artisans.length}</div><div class="stat-lbl">Total</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--emerald)">${active}</div><div class="stat-lbl">Active</div></div>
    </div>
    <div style="margin-bottom:12px"><input class="inp" type="text" placeholder="Search artisans…" oninput="filterArtisans(this.value)" style="font-size:13px"/></div>
    <div id="artisanList">`+
    artisans.map(a=>artisanRow(a)).join('')+
    `</div>`;
}

function artisanRow(a){
  const expiry=a.expiry?.toDate?a.expiry.toDate():a.expiry?new Date(a.expiry):null;
  const daysLeft=expiry?Math.max(0,Math.round((expiry-Date.now())/86400000)):0;
  return`<div class="user-row" onclick="showArtisanDetail('${a.uid}')">
    <div class="avatar">${initials(a.name)}</div>
    <div style="flex:1;min-width:0">
      <div style="font-weight:700;font-size:14px">${san(a.name)}</div>
      <div style="font-size:11px;color:var(--slate3)">${san(a.trade)} · 📍 ${san(a.zone)}</div>
      <div style="font-size:11px;color:var(--slate3)">${a.status==='active'?`${daysLeft} days left`:'—'}</div>
    </div>
    <div style="text-align:right">
      <span class="pill pill-${a.status||'unsubscribed'}" style="font-size:11px">${a.status||'—'}</span>
      ${a.tier==='premium'?'<div style="font-size:10px;color:var(--amber);font-weight:700;margin-top:3px">⭐ Premium</div>':''}
    </div>
  </div>`;
}

window.filterArtisans=function(q){
  const list=document.getElementById('artisanList');if(!list)return;
  const filtered=(window._artisans||[]).filter(a=>
    (a.name||'').toLowerCase().includes(q.toLowerCase())||
    (a.trade||'').toLowerCase().includes(q.toLowerCase())||
    (a.zone||'').toLowerCase().includes(q.toLowerCase())||
    (a.email||'').toLowerCase().includes(q.toLowerCase())
  );
  list.innerHTML=filtered.map(a=>artisanRow(a)).join('');
};

  // Load reviews for this artisan

      <div class="row"><span class="lbl">Trade</span><span>${san(a.trade||'—')}</span></div>
      <div class="row"><span class="lbl">Zone</span><span>📍 ${san(a.zone||'—')}</span></div>
      <div class="row"><span class="lbl">Rating</span><span>${a.rating?a.rating.toFixed(1)+' ⭐ ('+a.reviews+' reviews)':'No reviews'}</span></div>
      <div class="row"><span class="lbl">Days Left</span><span style="font-weight:700;color:${daysLeft<=5?'var(--red)':'var(--emerald)'}">${a.status==='active'?daysLeft+' days':'—'}</span></div>
      <div class="row"><span class="lbl">Booked Today</span><span>${a.daily_booked?'🔴 Yes':'🟢 No'}</span></div>
      <div class="row"><span class="lbl">Contract Signed</span><span style="font-size:12px">${fmtDate(a.contract_signed_date)}</span></div>
      <div class="row"><span class="lbl">Joined</span><span style="font-size:12px">${fmtDate(a.createdAt)}</span></div>

    ${(a.portfolios||[]).length?`<div class="card"><h3>📷 Portfolio</h3><div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:4px">${a.portfolios.map(p=>`<img src="${p}" style="width:90px;height:70px;border-radius:8px;object-fit:cover;flex-shrink:0"/>`).join('')}</div></div>`:''}
    <div class="card"><h3>⭐ Recent Reviews</h3>${reviewsHTML}</div>
    <div class="card">
      <h3>⚡ Admin Actions</h3>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px">

        <button class="btn btn-sm btn-outline" onclick="resetBooking('${uid}')">🔄 Reset Booking</button>

window.forceActivate=async function(uid){
  const expiry=new Date(Date.now()+2592000000);
  await updateDoc(doc(db,'users',uid),{status:'active',expiry,activatedAt:serverTimestamp()});
  toast('✅ Activated for 30 days!');showArtisanDetail(uid);
};
window.resetBooking=async function(uid){
  await updateDoc(doc(db,'users',uid),{daily_booked:false});
  toast('✅ Booking reset!');showArtisanDetail(uid);
};
window.upgradePremium=async function(uid){
  await updateDoc(doc(db,'users',uid),{tier:'premium'});
  toast('⭐ Upgraded to Premium!');showArtisanDetail(uid);
};
window.setStandard=async function(uid){
  await updateDoc(doc(db,'users',uid),{tier:'standard'});
  toast('Set to Standard.');showArtisanDetail(uid);
};
window.setUnsubscribed=async function(uid){
  await updateDoc(doc(db,'users',uid),{status:'unsubscribed'});
  toast('Set to Unsubscribed.');showArtisanDetail(uid);
};
window.banUser=async function(uid){
  if(!confirm('Permanently ban this account? This cannot be undone.'))return;
  await updateDoc(doc(db,'users',uid),{status:'banned'});
  toast('Account banned.');loadTab('artisans');
};
window.extendSub=async function(uid){
  const days=parseInt(document.getElementById('extendDays')?.value||0);
  if(!days||days<1){toast('Enter valid number of days.');return}
  const snap=await getDoc(doc(db,'users',uid));
  if(!snap.exists())return;
  const current=snap.data().expiry?.toDate?snap.data().expiry.toDate():new Date(snap.data().expiry||Date.now());
  const newExpiry=new Date(Math.max(current.getTime(),Date.now())+days*86400000);
  await updateDoc(doc(db,'users',uid),{expiry:newExpiry,status:'active'});
  toast(`✅ Subscription extended by ${days} days!`);showArtisanDetail(uid);
};
window.sendNote=async function(uid,name){
  const txt=document.getElementById('noteText')?.value?.trim();
  if(!txt){toast('Please type a message first.');return}
  await addDoc(collection(db,'supportNotes'),{toUid:uid,toName:name,message:txt,sentAt:serverTimestamp(),sentBy:'Admin'});
  toast('Note sent to '+name+' ✅');
  document.getElementById('noteText').value='';
};
